<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <title>여행 앨범</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style(myTrip).css">

</head>

<body>

<div class="container">

    <h1>Travel <span>Album</span></h1>

    <p class="intro">
        소중한 여행의 순간들을 기록한 여행 앨범입니다.<br>
        앨범 구경을 완료한 후 각 앨범카드를 클릭해보세요!
    </p>

    <div class="trip-list">

        <!-- ========================= -->

        <div class="trip-item">

            <div class="stamp">VISITED</div>

            <span>01</span>

            <div class="line"></div>

            <h2>제주도</h2>

            <img src="media/제주.jpg" alt="제주도">

            <!-- 과제 조건 -->
            <p class="trip-card">
                제주도의 넓고 푸른 풍경과 맑은 바다 그리고
                <br> 맛있는 음식까지 최고의 여행지입니다.
            </p>

            <video controls>
                <source src="media/제주바다.mp4" type="video/mp4">
            </video>

            <audio controls>
                <source src="media/제주도노래.mp3" type="audio/mpeg">
            </audio>

        </div>

        <!-- ========================= -->

        <div class="trip-item">

            <div class="stamp">VISITED</div>

            <span>02</span>

            <div class="line"></div>

            <h2>후쿠오카</h2>

            <img src="media/모모치해변.jpg" alt="후쿠오카">

            <!-- 과제 조건 -->
            <p class="trip-card">
                모모치해변은 계절 상관없이 언제나 예쁩니다.<br>
                일본 감성과 바다 풍경이 정말 인상 깊었습니다.
            </p>

            <video controls>
                <source src="media/후쿠오카공연.mp4" type="video/mp4">
            </video>

            <audio controls>
                <source src="media/후쿠오카노래.mp3" type="audio/mpeg">
            </audio>

        </div>

        <!-- ========================= -->

        <div class="trip-item">

            <div class="stamp">VISITED</div>

            <span>03</span>

            <div class="line"></div>

            <h2>서울</h2>

            <img src="media/서울.jpg" alt="서울">

            <!-- 과제 조건 -->
            <p class="trip-card">
                서울은 볼거리가 많아서 하루가 금방 지나갑니다.<br>
                카페와 야경이 특히 기억에 남았습니다.
            </p>

            <video controls>
                <source src="media/서울명동성당.mp4" type="video/mp4">
            </video>

            <audio controls>
                <source src="media/서울노래.mp3" type="audio/mpeg">
            </audio>

        </div>

    </div>

</div>

<script src="script/Trip.js"></script>

</body>
</html>
