<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>회원가입 완료</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<link rel="stylesheet" href="css/style(signUpResult).css">

</head>

<body>

<div class="container">

    <div class="check">✓</div>

    <h1>회원가입이 <span>완료</span>되었습니다.</h1>

    <p class="intro">
        새로운 시작을 진심으로 환영합니다.<br>
        입력해주신 정보로 회원가입이 정상적으로 완료되었습니다.
    </p>

    <div class="info-box">

        <h2>가입 정보</h2>

        <p><strong>아이디</strong> : <span id="userId"></span></p>

        <p><strong>이메일</strong> : <span id="userEmail"></span></p>

    </div>

    <button onclick="location.href='index.html'">
        메인으로 돌아가기

    </button>

<p class="countdown" id="countdown">
    30초 후 자동으로 이동합니다.
</p>

</div>
<script src="script/Result.js"></script>

</body>

</html>
